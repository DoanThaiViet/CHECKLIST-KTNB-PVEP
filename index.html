// ===== TOAST =====
function showToast(msg, dur=3000){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ===== PARSE EXCEL SHEET INTO GROUPED CHECKLIST =====
// Detects group headers like "A. QUẢN TRỊ & TỔ CHỨC CNTT" and splits items into groups
function parseSheetWithGroups(rows, existingHeaders) {
  let headerIdx = -1;
  for(let i=0;i<Math.min(8,rows.length);i++){
    if(rows[i] && rows[i][0]==='STT'){headerIdx=i;break}
  }
  if(headerIdx===-1) return null;

  const headers = existingHeaders || rows[headerIdx].filter(h=>h!=='');
  const groups = [];
  let currentGroup = { name: '', items: [] };

  for(let i=headerIdx+1; i<rows.length; i++){
    const row = rows[i];
    if(!row || row.every(c=>c===''||c===undefined||c===null)) continue;

    const col0 = row[0];
    const col1 = row[1] || '';
    const col2 = row[2] || '';

    // Detect GROUP HEADER: col0 is a long string, not a number, and rest of important cols are empty
    const isGroupHeader = (typeof col0 === 'string' && col0.length > 3 && isNaN(Number(col0)) && col0 !== 'STT' && (col2 === ''));

    if(isGroupHeader) {
      if(currentGroup.items.length > 0 || currentGroup.name) {
        groups.push(currentGroup);
      }
      currentGroup = { name: col0.trim(), items: [] };
      continue;
    }

    // Data row
    const item = {};
    headers.forEach((h, idx) => {
      if(h && row[idx] !== undefined && row[idx] !== '') {
        item[h] = String(row[idx]).trim();
      }
    });
    if(Object.keys(item).length > 1) {
      currentGroup.items.push(item);
    }
  }

  if(currentGroup.items.length > 0) {
    groups.push(currentGroup);
  }

  const totalItems = groups.reduce((s,g)=>s+g.items.length, 0);
  if(totalItems < 1) return null;

  // Check if headers look like checklist
  const hStr = headers.join('|').toLowerCase();
  if(!hStr.includes('bước') && !hStr.includes('kiểm tra') && !hStr.includes('mục tiêu') && !hStr.includes('nội dung') && !hStr.includes('hệ thống') && !hStr.includes('hạng mục')) return null;

  return { headers, groups };
}

let activeIdx=-1, activeTab='tasks', checklistCache=null;

function badgeCls(t){return t==='KTNB'?'badge-ktnb':t==='KTGS'?'badge-ktgs':'badge-mixed'}
function teamLbl(t){return t==='mixed'?'Cả hai':t}

// Sidebar
function renderSidebar(q=''){
  const list=document.getElementById('sidebarList');
  const s=q.toLowerCase().trim();
  const filtered=s?DATA.filter(lv=>lv.name.toLowerCase().includes(s)||lv.code.toLowerCase().includes(s)||(lv.docs&&lv.docs.toLowerCase().includes(s))||lv.tasks.some(t=>t.pic.toLowerCase().includes(s)||t.title.toLowerCase().includes(s)||(t.subItems&&t.subItems.some(si=>si.toLowerCase().includes(s))))):DATA;
  if(!filtered.length){list.innerHTML='<div style="padding:30px;text-align:center;color:var(--text3);font-size:13px">Không tìm thấy</div>';return}
  list.innerHTML=filtered.map(lv=>{
    const pc=new Set(lv.tasks.map(t=>t.pic).filter(p=>p!=='Nhiều PIC'&&p!=='Theo phân công')).size;
    return `<div class="sidebar-item ${activeIdx===lv.stt?'active':''}" onclick="selectLV(${lv.stt})">
      <div class="s-num">${lv.stt}</div>
      <div class="s-info"><div class="s-name">${lv.name}</div><div class="s-sub">${lv.tasks.length} NV · ${pc} PIC</div></div>
      <span class="s-badge ${badgeCls(lv.team)}">${teamLbl(lv.team)}</span>
    </div>`}).join('');
}

// Tab switching
document.getElementById('detailTabs').addEventListener('click',e=>{
  const tab=e.target.closest('.detail-tab');
  if(!tab)return;
  document.querySelectorAll('.detail-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  activeTab=tab.dataset.tab;
  renderDetail();
});

function selectLV(stt){
  activeIdx=stt;activeTab='tasks';
  document.querySelectorAll('.detail-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.detail-tab[data-tab="tasks"]').classList.add('active');
  renderSidebar(document.getElementById('search').value);
  document.getElementById('detailTabs').style.display='flex';
  renderDetail();
}

function renderDetail(){
  const lv=DATA.find(d=>d.stt===activeIdx);
  if(!lv)return;
  if(activeTab==='tasks') renderTasks(lv);
  else renderChecklist(lv);
}

// Tasks view
function renderTasks(lv){
  const body=document.getElementById('detailBody');
  let h=`<div class="fade-in"><div class="d-header">
    <div class="top"><span class="s-badge ${badgeCls(lv.team)}" style="font-size:11px;padding:3px 10px">${teamLbl(lv.team)}</span><span style="font-size:12px;color:var(--text3)">LV #${lv.stt} · ${lv.code}</span></div>
    <h2>${lv.name}</h2>${lv.docs?`<div class="docs">${lv.docs}</div>`:''}</div>`;
  lv.tasks.forEach(t=>{
    h+=`<div class="task-section"><div class="nv-label"><span class="nv-dot"></span>${NV_LABELS[t.nv]||t.nv}</div>
    <div class="t-card"><div class="t-card-top"><div class="t-title">${t.title}</div>
    ${t.doan&&t.doan!=='mixed'?`<span class="s-badge ${badgeCls(t.doan)}">${t.doan}</span>`:''}</div>`;
    if(t.output)h+=`<div class="t-output">${t.output}</div>`;
    if(t.subItems){h+='<ul class="sub-list">';t.subItems.forEach(si=>{h+=`<li>${si}</li>`});h+='</ul>'}
    h+=`<div class="t-people">
      <div class="t-person">👤 PIC: <span class="nm">${t.pic}</span></div>
      ${t.reviewer?`<div class="t-person">👁 Rà soát: <span class="nm">${t.reviewer}</span></div>`:''}
      ${t.lead?`<div class="t-person">🛡 LĐ: <span class="nm">${t.lead}</span></div>`:''}
    </div></div></div>`;
  });
  h+='</div>';body.innerHTML=h;
}

// Checklist view with GROUPS
async function renderChecklist(lv){
  const body=document.getElementById('detailBody');
  if(!lv.clSheet){body.innerHTML='<div class="cl-empty">Lĩnh vực này chưa có sheet checklist.</div>';return}

  // Load JSON
  if(!checklistCache){
    body.innerHTML='<div class="cl-empty">⏳ Đang tải checklist...</div>';
    try{const r=await fetch('checklists.json');checklistCache=await r.json()}
    catch(e){body.innerHTML='<div class="cl-empty">❌ Không tải được checklists.json</div>';return}
  }

  // Collect all sheets for this LV
  let allSheets = [lv.clSheet];
  if (EXTRA_CL_MAP[lv.stt]) allSheets = EXTRA_CL_MAP[lv.stt];

  let h=`<div class="fade-in"><div class="d-header">
    <div class="top"><span class="s-badge ${badgeCls(lv.team)}" style="font-size:11px;padding:3px 10px">${teamLbl(lv.team)}</span>
    <span style="font-size:12px;color:var(--text3)">Checklist kiểm tra</span></div>
    <h2>${lv.name}</h2></div>`;

  let hasData = false;

  allSheets.forEach(sheetName => {
    const clData = checklistCache[sheetName];
    if(!clData) return;

    const stepKey = clData.headers.find(h2=>h2.includes('Bước')||h2.includes('Hạng mục')||h2.includes('Hệ thống'))||clData.headers[1];

    // Use groups if available, otherwise wrap items into a single group
    let groups;
    if (clData.groups && clData.groups.length > 0) {
      groups = clData.groups;
    } else if (clData.items && clData.items.length > 0) {
      groups = [{ name: '', items: clData.items }];
    } else {
      return;
    }

    hasData = true;
    groups.forEach((g, gi) => {
      if (!g.items || !g.items.length) return;
      const gName = g.name || sheetName.replace('KH_','').replace(/_/g,' ');
      h += renderGroupBlock(gName, sheetName, g.items, stepKey, clData.headers, gi);
    });
  });

  if (!hasData) {
    h += '<div class="cl-empty">Chưa có dữ liệu checklist cho lĩnh vực này.</div>';
  }

  h+='</div>';body.innerHTML=h;
}

function renderGroupBlock(groupName, sheetName, items, stepKey, headers, groupIdx) {
  const fieldMap=[
    {key:'Mục tiêu/Nội dung công việc',label:'Nội dung công việc',full:true},
    {key:'Hồ sơ/Bằng chứng cần thu thập',label:'Hồ sơ / Bằng chứng'},
    {key:'Sai sót/rủi ro tiềm tàng',label:'Sai sót / Rủi ro tiềm tàng'},
    {key:'Tham chiếu Điều/khoản',label:'Tham chiếu'},
    {key:'Phương pháp kiểm tra',label:'Phương pháp kiểm tra'},
    {key:'Tiêu chí đánh giá',label:'Tiêu chí đánh giá'},
  ];

  let h=`<div class="cl-group">
    <div class="cl-group-title">
      <span class="cl-group-icon">📂</span>
      ${groupName}
      <span class="cl-group-count">${items.length} bước</span>
    </div>`;

  items.forEach((item,i)=>{
    const num=item.STT||(i+1);
    const stepName=item[stepKey]||'';
    const pic=item.PIC||'';

    h+=`<div class="cl-step">
      <div class="cl-step-header" onclick="toggleStep(this)">
        <div class="cl-num">${num}</div>
        <div class="cl-step-name">${stepName}</div>
        <div class="cl-arrow">▼</div>
      </div>
      <div class="cl-step-body">
        <div class="cl-grid">`;
    fieldMap.forEach(f=>{
      const val=item[f.key];
      if(val){h+=`<div class="cl-field ${f.full?'full':''}"><div class="cl-field-label">${f.label}</div><div class="cl-field-value">${val}</div></div>`}
    });
    h+=`</div>`;
    if(pic)h+=`<div class="cl-pic-badge">👤 PIC: ${pic}</div>`;
    h+=`</div></div>`;
  });

  h+=`</div>`;
  return h;
}

function toggleStep(el){
  el.classList.toggle('open');
  el.querySelector('.cl-arrow').classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

// ===== EXCEL UPLOAD =====
document.getElementById('fileInput').addEventListener('change', async function(e){
  const file = e.target.files[0];
  if(!file) return;
  showToast('⏳ Đang xử lý file Excel...');

  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);

  const result = {};
  wb.SheetNames.forEach(sheetName => {
    const ws = wb.Sheets[sheetName];
    if(!ws || !ws['!ref']) return;
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

    const parsed = parseSheetWithGroups(rows);
    if(parsed) {
      result[sheetName] = parsed;
    }
  });

  checklistCache = result;

  // Count groups and items
  let totalGroups = 0, totalItems = 0;
  Object.values(result).forEach(d => {
    d.groups.forEach(g => { totalGroups++; totalItems += g.items.length; });
  });

  showToast(`✅ Cập nhật thành công! ${Object.keys(result).length} sheet · ${totalGroups} nhóm · ${totalItems} bước`);

  // Re-render if on checklist tab
  if(activeTab==='checklist'&&activeIdx>0) renderDetail();
  e.target.value=''; // reset input
});

// Search
document.getElementById('search').addEventListener('input',e=>renderSidebar(e.target.value));

// Init
renderSidebar();
</script>
